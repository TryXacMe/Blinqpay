<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Blinqpay</title>
  </head>
  <body>
    <header class="header">
      <div class="header__container container">
        <img src="./assents/Logo (1).png" alt="blinqpay" class="logo" />
        <nav class="header__nav">
          <ul class="header__menu">
            <li class="header__item">
              <a href="#" class="header__link">Products</a>
            </li>

            <li class="header__item">
              <a href="#" class="header__link">Developers</a>
            </li>

            <li class="header__item">
              <a href="#" class="header__link">Company</a>
            </li>

            <li class="header__item">
              <a href="#" class="header__link">Pricing</a>
            </li>
          </ul>
        </nav>
        <div class="header__actions">
          <button class="header__supportBtn">Support</button>
          <button class="header__signBtn">Sign in</button>
        </div>
      </div>
    </header>

    <main>
      <section class="intro">
        <div class="intro__container container">
          <div class="intro__left">
            <h1 class="intro__title">Get Your Payment Faster</h1>
            <p class="intro__text">
              Blinqpay helps businesses in Africa get paid by anyone, anywhere
              in the world
            </p>
            <button class="intro__btn">Start Now</button>
          </div>

          <img src="./assents/compyuter.png" alt="compyuter" class="intro__imgComp">
          <img src="./assents/noutbook.png" alt="noutbook" class="intro__imgNout">
        </div>
      </section>

      <section class="payments">
        <div class="payments__container container"></div>
      </section>
    </main>
  </body>
</html>
